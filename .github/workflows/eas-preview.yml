name: EAS Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build preview APK
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: artifacts/pots-companion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build preview (Android APK)
        id: build
        run: |
          BUILD_JSON=$(eas build --profile preview --platform android --non-interactive --json 2>/dev/null)
          BUILD_URL=$(echo "$BUILD_JSON" | node -e "process.stdin.resume(); let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try { const b=JSON.parse(d); console.log(b[0]?.buildDetailsPageUrl || b?.buildDetailsPageUrl || ''); } catch(e){ console.log(''); }})")
          ARTIFACT_URL=$(echo "$BUILD_JSON" | node -e "process.stdin.resume(); let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try { const b=JSON.parse(d); console.log(b[0]?.artifacts?.buildUrl || b?.artifacts?.buildUrl || ''); } catch(e){ console.log(''); }})")
          echo "build_details_page_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT

      - name: Comment APK link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildUrl = '${{ steps.build.outputs.build_details_page_url }}';
            const artifactUrl = '${{ steps.build.outputs.artifact_url }}';
            const body = [
              '## Preview Build Ready',
              '',
              buildUrl ? `**Build details:** ${buildUrl}` : '_Build submitted to EAS — check your Expo dashboard for the build link._',
              artifactUrl ? `**Download APK:** ${artifactUrl}` : '_APK link will appear in the build details page once the build finishes._',
              '',
              '_Built with EAS on commit ${{ github.sha }}_',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

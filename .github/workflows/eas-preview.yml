name: EAS Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build preview APK
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: artifacts/pots-companion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build preview (Android APK)
        id: build
        run: |
          BUILD_OUTPUT=$(eas build --profile preview --platform android --non-interactive --json 2>/dev/null || eas build --profile preview --platform android --non-interactive)
          echo "build_output<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          BUILD_URL=$(echo "$BUILD_OUTPUT" | grep -o 'https://expo.dev/accounts/[^"]*' | head -1 || true)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Comment build link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.build_output }}`;
            const buildUrl = `${{ steps.build.outputs.build_url }}`;
            const body = [
              '## Preview Build Started',
              '',
              buildUrl ? `**Build details:** ${buildUrl}` : '_Build submitted to EAS. Check your Expo dashboard for the build link._',
              '',
              '_Built with EAS on commit ${{ github.sha }}_',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
